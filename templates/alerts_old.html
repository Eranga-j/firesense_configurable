{% extends "base.html" %}

{% block title %}Alerts{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-bell"></i> Alerts & Notifications
    </h1>
    <p class="page-subtitle">Monitor and manage system alerts</p>
</div>

<div class="card">
    <div class="card-header">
        <i class="fas fa-filter"></i> Filter Alerts
        <div style="margin-left: auto;">
            <button class="btn btn-primary" onclick="checkAlerts()">
                <i class="fas fa-sync"></i> Check for New Alerts
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <select id="filterSeverity" class="form-control" onchange="filterAlerts()">
                    <option value="">All Severities</option>
                    <option value="Critical">Critical</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
            <div class="form-group">
                <select id="filterStatus" class="form-control" onchange="filterAlerts()">
                    <option value="active">Active Only</option>
                    <option value="all">All Alerts</option>
                    <option value="resolved">Resolved Only</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="fas fa-list"></i> All Alerts
        <span id="alertCount" style="margin-left: 10px; color: var(--text-secondary);"></span>
    </div>
    <div class="card-body" id="alertsContainer">
        <p style="text-align: center; color: var(--text-secondary); padding: 40px;">
            Loading alerts...
        </p>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let allAlerts = [];

    async function loadAlerts() {
        try {
            const response = await fetch('/api/alerts');
            allAlerts = await response.json();
            displayAlerts(allAlerts);
        } catch (error) {
            console.error('Error loading alerts:', error);
        }
    }

    function displayAlerts(alerts) {
        const container = document.getElementById('alertsContainer');
        document.getElementById('alertCount').textContent = `(${alerts.length} alerts)`;
        
        if (alerts.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-check-circle"></i>
                    <h3>No Alerts</h3>
                    <p>All equipment is being monitored</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = alerts.map(alert => `
            <div style="border-left: 4px solid ${
                alert.severity === 'Critical' || alert.severity === 'High' ? 'var(--danger)' :
                alert.severity === 'Medium' ? 'var(--warning)' : 'var(--info)'
            }; padding: 20px; margin-bottom: 15px; background: ${
                alert.is_resolved ? 'rgba(255,255,255,0.01)' : 'rgba(255,255,255,0.03)'
            }; border-radius: 5px; opacity: ${alert.is_resolved ? '0.6' : '1'};">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                    <div>
                        <span class="badge badge-${
                            alert.severity === 'Critical' || alert.severity === 'High' ? 'danger' :
                            alert.severity === 'Medium' ? 'warning' : 'info'
                        }">${alert.severity}</span>
                        <span class="badge badge-secondary" style="margin-left: 10px;">${alert.alert_type}</span>
                        ${alert.is_resolved ? '<span class="badge badge-success" style="margin-left: 10px;">Resolved</span>' : ''}
                        ${!alert.is_read && !alert.is_resolved ? '<span class="badge badge-warning" style="margin-left: 10px;">New</span>' : ''}
                    </div>
                    <small style="color: var(--text-secondary);">${alert.created_at}</small>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <strong style="color: var(--text-primary); font-size: 16px;">${alert.equipment_type} - ${alert.location}</strong>
                    ${alert.equipment_id ? `
                        <div style="margin-top: 5px; display: flex; align-items: center; gap: 10px;">
                            <span style="color: var(--text-secondary); font-size: 14px;">
                                <i class="fas fa-barcode"></i> Equipment ID:
                            </span>
                            <span style="color: var(--primary); font-weight: bold; font-size: 14px;">
                                ${alert.equipment_id}
                            </span>
                            <a href="/equipment/${alert.equipment_db_id}" 
                               class="btn btn-secondary" 
                               style="padding: 3px 10px; font-size: 12px; margin-left: 10px;">
                                <i class="fas fa-eye"></i> View Equipment
                            </a>
                        </div>
                    ` : ''}
                </div>
                
                <p style="color: var(--text-secondary); margin-bottom: 15px;">
                    ${alert.message}
                </p>
                
                ${!alert.is_resolved ? `
                <div style="display: flex; gap: 10px;">
                    ${!alert.is_read ? `
                    <button class="btn btn-secondary" style="padding: 5px 15px; font-size: 12px;" 
                            onclick="markAsRead(${alert.id})">
                        <i class="fas fa-check"></i> Mark as Read
                    </button>
                    ` : ''}
                    <button class="btn btn-success" style="padding: 5px 15px; font-size: 12px;" 
                            onclick="resolveAlert(${alert.id})">
                        <i class="fas fa-check-double"></i> Resolve
                    </button>
                </div>
                ` : ''}
            </div>
        `).join('');
    }

    function filterAlerts() {
        const severity = document.getElementById('filterSeverity').value;
        const status = document.getElementById('filterStatus').value;
        
        const filtered = allAlerts.filter(alert => {
            const matchSeverity = !severity || alert.severity === severity;
            const matchStatus = 
                status === 'all' ? true :
                status === 'active' ? !alert.is_resolved :
                alert.is_resolved;
            
            return matchSeverity && matchStatus;
        });
        
        displayAlerts(filtered);
    }

    async function markAsRead(alertId) {
        try {
            const response = await fetch(`/api/alerts/${alertId}/mark-read`, {
                method: 'POST'
            });
            
            if (response.ok) {
                showToast('Alert marked as read', 'success');
                loadAlerts();
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
    }

    async function resolveAlert(alertId) {
        try {
            const response = await fetch(`/api/alerts/${alertId}/resolve`, {
                method: 'POST'
            });
            
            if (response.ok) {
                showToast('Alert resolved successfully', 'success');
                loadAlerts();
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
    }

    async function checkAlerts() {
        try {
            showToast('Checking for new alerts...', 'success');
            const response = await fetch('/api/check-alerts');
            const data = await response.json();
            
            if (response.ok) {
                showToast(`Found ${data.alerts_created} new alerts`, 'success');
                loadAlerts();
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
    }

    loadAlerts();
</script>
{% endblock %}
